<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MP3 Device Controller</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            max-width: 900px;
        }

        h1 {
            margin-bottom: 8px;
        }

        .muted {
            color: #666;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }

        input[type="number"],
        input[type="range"] {
            padding: 6px;
        }

        .panel {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin: 12px 0;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin: 6px 0;
        }

        .current {
            font-weight: bold;
        }

        .status {
            margin-top: 8px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <h1>MP3 Device Controller</h1>
    <div class="muted">Local controller for <code>/v1</code> API</div>

    <div class="panel">
        <div id="nowPlaying">Loading state...</div>
        <div id="meta" class="muted"></div>
        <div id="versions" class="muted"></div>
    </div>

    <div class="panel">
        <div class="row">
            <button onclick="callPlayback('/play')">Play</button>
            <button onclick="callPlayback('/pause')">Pause</button>
            <button onclick="callPlayback('/stop')">Stop</button>
            <button onclick="callPlayback('/toggle')">Toggle</button>
            <button onclick="callPlayback('/prev')">Prev</button>
            <button onclick="callPlayback('/next')">Next</button>
        </div>
        <div class="row">
            <button onclick="callPlayback('/shuffle/toggle')">Shuffle Toggle</button>
            <button onclick="callPlayback('/repeat/cycle')">Repeat Cycle</button>
        </div>
        <div class="row">
            <label>Volume:</label>
            <input id="volume" type="range" min="0" max="1" step="0.01" value="0.5" oninput="setVolume()" />
            <span id="volumeDisplay">0.50</span>
        </div>
        <div class="row">
            <label>Seek (seconds):</label>
            <input id="seek" type="range" min="0" step="1" value="0" oninput="seek()" />
            <span id="seekDisplay">0</span>
        </div>
        <div id="status" class="status muted"></div>
    </div>

    <div class="panel">
        <h3>Playlists</h3>
        <div id="playlists" class="row"></div>
        <div class="row" style="margin-top:10px;align-items:center;gap:6px;">
            <input id="newPlaylistName" type="text" placeholder="New playlist name..."
                style="padding:6px;flex:1;max-width:240px;" />
            <button onclick="createPlaylist()">Create</button>
            <button id="deletePlaylistBtn" onclick="deleteCurrentPlaylist()" style="margin-left:16px;color:#b00020;"
                disabled>Delete playlist</button>
        </div>
    </div>

    <div class="panel">
        <h3>Queue</h3>
        <ul id="queue"></ul>
        <div id="addSongSection" style="display:none;margin-top:10px;border-top:1px solid #eee;padding-top:10px;">
            <strong>Add song to this playlist:</strong>
            <div class="row" style="align-items:center;gap:6px;margin-top:6px;">
                <select id="addSongSelect" style="flex:1;max-width:400px;padding:6px;"></select>
                <button onclick="addSelectedSong()">Add</button>
            </div>
        </div>
    </div>

    <script>
        async function fetchJson(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(options.headers || {}),
                },
            });
            let data = null;
            const contentType = res.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                data = await res.json();
            } else {
                const text = await res.text();
                data = { message: text };
            }
            if (!res.ok) {
                const err = new Error(data?.message || `HTTP ${res.status}`);
                err.status = res.status;
                err.payload = data;
                throw err;
            }
            return data;
        }

        async function postWithConflictRetry(url, body) {
            try {
                return await fetchJson(url, {
                    method: 'POST',
                    body: JSON.stringify(body),
                });
            } catch (err) {
                if (err.status === 409) {
                    await refreshAll();
                    return await fetchJson(url, {
                        method: 'POST',
                        body: JSON.stringify(body),
                    });
                }
                throw err;
            }
        }

        function showStatus(msg, isError = false) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.style.color = isError ? '#b00020' : '#444';
        }

        async function callPlayback(path) {
            try {
                const data = await fetchJson(`/v1/playback${path}`, { method: 'POST' });
                showStatus(data.message || 'OK');
                await refreshAll();
            } catch (err) {
                showStatus(err.message, true);
            }
        }

        async function setVolume() {
            const value = Number(document.getElementById('volume').value);
            document.getElementById('volumeDisplay').textContent = value.toFixed(2);
            try {
                await fetchJson('/v1/playback/volume', {
                    method: 'POST',
                    body: JSON.stringify({ volume: value }),
                });
            } catch (err) {
                showStatus(`Volume error: ${err.message}`, true);
            }
        }

        async function seek() {
            const value = Number(document.getElementById('seek').value);
            document.getElementById('seekDisplay').textContent = value;
            try {
                await fetchJson('/v1/playback/seek', {
                    method: 'POST',
                    body: JSON.stringify({ position_seconds: value }),
                });
            } catch (err) {
                showStatus(`Seek error: ${err.message}`, true);
            }
        }

        async function selectIndex(index) {
            try {
                const data = await postWithConflictRetry('/v1/queue/select', { index });
                showStatus(data.message || 'Selected');
                await refreshAll();
            } catch (err) {
                showStatus(err.message, true);
            }
        }

        async function playIndex(index) {
            try {
                const data = await postWithConflictRetry('/v1/queue/play', { index });
                showStatus(data.message || 'Playing');
                await refreshAll();
            } catch (err) {
                showStatus(err.message, true);
            }
        }

        async function usePlaylist(name) {
            try {
                const data = await postWithConflictRetry('/v1/playlists/use', { name });
                showStatus(data.message || `Switched to ${name}`);
                await refreshAll();
            } catch (err) {
                showStatus(err.message, true);
            }
        }

        // Playlist state shared across refresh functions
        let _currentPlaylistName = 'All songs';
        let _allPlaylistNames = [];
        let _allLibrarySongs = [];

        async function refreshPlaylists() {
            try {
                const data = await fetchJson('/v1/playlists');
                _currentPlaylistName = data.current_playlist_name;
                _allPlaylistNames = data.names;

                const container = document.getElementById('playlists');
                container.innerHTML = '';
                data.names.forEach(name => {
                    const btn = document.createElement('button');
                    btn.textContent = name;
                    if (name === data.current_playlist_name) {
                        btn.style.fontWeight = 'bold';
                        btn.style.backgroundColor = '#eee';
                    }
                    btn.onclick = () => usePlaylist(name);
                    container.appendChild(btn);
                });

                const deleteBtn = document.getElementById('deletePlaylistBtn');
                const isAllSongs = data.current_playlist_name === 'All songs';
                deleteBtn.disabled = isAllSongs;
                deleteBtn.textContent = isAllSongs
                    ? 'Delete playlist'
                    : `Delete "${data.current_playlist_name}"`;
            } catch (err) {
                showStatus(`Playlists error: ${err.message}`, true);
            }
        }

        async function refreshLibrary() {
            try {
                const data = await fetchJson('/v1/library');
                _allLibrarySongs = data.songs;
                _repopulateAddSongSelect();
            } catch (err) {
                // non-fatal
            }
        }

        function _repopulateAddSongSelect() {
            const sel = document.getElementById('addSongSelect');
            sel.innerHTML = '';
            _allLibrarySongs.forEach(song => {
                const opt = document.createElement('option');
                opt.value = song.path;
                opt.textContent = song.artist ? `${song.title} — ${song.artist}` : song.title;
                sel.appendChild(opt);
            });
        }

        async function createPlaylist() {
            const input = document.getElementById('newPlaylistName');
            const name = input.value.trim();
            if (!name) { showStatus('Enter a playlist name', true); return; }
            try {
                const data = await fetchJson('/v1/playlists/create', {
                    method: 'POST',
                    body: JSON.stringify({ name }),
                });
                showStatus(data.message || `Created "${name}"`);
                input.value = '';
                await refreshAll();
            } catch (err) {
                showStatus(err.payload?.detail || err.message, true);
            }
        }

        async function deleteCurrentPlaylist() {
            if (_currentPlaylistName === 'All songs') return;
            if (!confirm(`Delete playlist "${_currentPlaylistName}"?`)) return;
            try {
                const data = await fetchJson('/v1/playlists/delete', {
                    method: 'POST',
                    body: JSON.stringify({ name: _currentPlaylistName }),
                });
                showStatus(data.message || `Deleted "${_currentPlaylistName}"`);
                await refreshAll();
            } catch (err) {
                showStatus(err.payload?.detail || err.message, true);
            }
        }

        async function removeSongFromPlaylist(songPath) {
            try {
                const data = await fetchJson('/v1/playlists/remove-song', {
                    method: 'POST',
                    body: JSON.stringify({ playlist_name: _currentPlaylistName, song_path: songPath }),
                });
                showStatus(data.message || 'Removed');
                await refreshAll();
            } catch (err) {
                showStatus(err.payload?.detail || err.message, true);
            }
        }

        async function addSelectedSong() {
            const sel = document.getElementById('addSongSelect');
            const songPath = sel.value;
            if (!songPath) return;
            try {
                const data = await fetchJson('/v1/playlists/add-song', {
                    method: 'POST',
                    body: JSON.stringify({ playlist_name: _currentPlaylistName, song_path: songPath }),
                });
                showStatus(data.message || 'Added');
                await refreshAll();
            } catch (err) {
                showStatus(err.payload?.detail || err.message, true);
            }
        }

        async function refreshState() {
            const state = await fetchJson('/v1/state');
            document.getElementById('nowPlaying').textContent =
                `${state.status.toUpperCase()} — ${state.current_song_title || '(none)'}`;
            document.getElementById('meta').textContent =
                `Playlist: ${state.playlist_name} | Index: ${state.playlist_index + 1}/${state.playlist_length} | Vol: ${state.volume.toFixed(2)} | Shuffle: ${state.shuffle} | Repeat: ${state.repeat_mode}`;
            document.getElementById('versions').textContent =
                `state_version=${state.state_version}, queue_version=${state.queue_version}, position=${Number(state.position_seconds || 0).toFixed(1)}s`;
            const length = Number(state.length_seconds || 0);
            if (length > 0) {
                document.getElementById('seek').max = Math.floor(length);
            }

            const volumeEl = document.getElementById('volume');
            if (document.activeElement !== volumeEl) {
                const volume = Number(state.volume || 0);
                volumeEl.value = volume;
                document.getElementById('volumeDisplay').textContent = volume.toFixed(2);
            }

            const seekEl = document.getElementById('seek');
            if (document.activeElement !== seekEl) {
                const pos = Math.floor(Number(state.position_seconds || 0));
                seekEl.value = pos;
                document.getElementById('seekDisplay').textContent = pos;
            }
        }

        async function refreshQueue() {
            const queue = await fetchJson('/v1/queue');
            const list = document.getElementById('queue');
            list.innerHTML = '';

            const isCustomPlaylist = queue.playlist_name !== 'All songs';
            document.getElementById('addSongSection').style.display = isCustomPlaylist ? 'block' : 'none';

            queue.items.forEach(item => {
                const li = document.createElement('li');
                li.className = item.is_current ? 'current' : '';

                const title = document.createElement('span');
                title.textContent = `[${item.index}] ${item.title}`;

                const selectBtn = document.createElement('button');
                selectBtn.textContent = 'Select';
                selectBtn.style.marginLeft = '8px';
                selectBtn.onclick = () => selectIndex(item.index);

                const playBtn = document.createElement('button');
                playBtn.textContent = 'Play';
                playBtn.style.marginLeft = '6px';
                playBtn.onclick = () => playIndex(item.index);

                li.appendChild(title);
                li.appendChild(selectBtn);
                li.appendChild(playBtn);

                if (isCustomPlaylist) {
                    const removeBtn = document.createElement('button');
                    removeBtn.textContent = 'Remove';
                    removeBtn.style.marginLeft = '6px';
                    removeBtn.style.color = '#b00020';
                    removeBtn.onclick = () => removeSongFromPlaylist(item.path);
                    li.appendChild(removeBtn);
                }

                list.appendChild(li);
            });
        }

        async function refreshAll() {
            try {
                await Promise.all([refreshState(), refreshQueue(), refreshPlaylists()]);
            } catch (err) {
                showStatus(`Refresh failed: ${err.message}`, true);
            }
        }

        refreshAll();
        refreshLibrary();
        setInterval(refreshAll, 100);
        setInterval(refreshLibrary, 10000);
    </script>
</body>

</html>
